name: 'Decrypt and Mask Secrets'
description: 'Decrypts a zip and masks the JSON contents as env vars'
inputs:
  zip_password:
    description: 'Password for the Zip'
    required: true
  zip_path:
    description: 'Path to the encrypted zip'
    required: false
    default: 'secrets.zip'

runs:
  using: "composite"
  steps:
    - name: install python deps
      shell: bash
      run: |
        pip install pyzipper
    - name: Decrypt and Mask
      shell: python
      run: |
        import pyzipper
        import json
        import os
        import base64
        import tempfile

        with pyzipper.AESZipFile('${{ inputs.zip_path }}') as zf:
            zf.setpassword('${{ inputs.zip_password }}'.encode())
            with zf.open('secrets.json') as f:
                secrets = json.load(f)

        with open(os.environ['GITHUB_ENV'], 'a') as env_file:
            for key, value in secrets.items():
                if value:
                    if key in ("icon_png_base64", "logo_png_base64", "privacy_png_base64"):
                        out_path = os.path.join(tempfile.gettempdir(), f"{key}.png")
                        with open(out_path, "wb") as image_file:
                            image_file.write(base64.b64decode(value))
                        env_file.write(f"{key.replace('_base64', '_file')}={out_path}\n")
                        continue
                    print(f"::add-mask::{value}")
                    env_file.write(f"{key}={value}\n")
        
        print(f"Successfully masked {len(secrets)} secrets.")
